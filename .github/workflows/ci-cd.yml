name: Test and Deploy

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nba2k_user
          POSTGRES_PASSWORD: nba2k_pass
          POSTGRES_DB: nba2k_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          echo "POSTGRES_HOST=localhost" >> .env
          echo "POSTGRES_PORT=5432" >> .env
          echo "POSTGRES_USER=nba2k_user" >> .env
          echo "POSTGRES_PASSWORD=nba2k_pass" >> .env
          echo "POSTGRES_DB=nba2k_db" >> .env
          echo "DATABASE_URL=postgresql://nba2k_user:nba2k_pass@localhost:5432/nba2k_db" >> .env
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env

      - name: Load schema
        run: |
          PGPASSWORD=nba2k_pass psql -h localhost -U nba2k_user -d nba2k_db -c "CREATE EXTENSION IF NOT EXISTS unaccent;"
          PGPASSWORD=nba2k_pass psql -h localhost -U nba2k_user -d nba2k_db -f db/init.sql

      - name: Seed test data
        run: |
          PGPASSWORD=nba2k_pass psql -h localhost -U nba2k_user -d nba2k_db -c "
          INSERT INTO players (player_id, full_name, first_name, last_name)
          VALUES
            (2544,  'LeBron James',          'LeBron',   'James'),
            (203999,'Nikola Jokić',           'Nikola',   'Jokić'),
            (201939,'Stephen Curry',          'Stephen',  'Curry'),
            (1629029,'Luka Dončić',           'Luka',     'Dončić'),
            (1628983,'Shai Gilgeous-Alexander','Shai',    'Gilgeous-Alexander')
          ON CONFLICT DO NOTHING;

          INSERT INTO ratings (player_id, season_year, ovr_rating, team_in_game, game_version, is_rookie)
          VALUES
            (2544,   2025, 94, 'lakers',          'nba-2k26', false),
            (203999, 2025, 98, 'nuggets',          'nba-2k26', false),
            (201939, 2025, 94, 'warriors',         'nba-2k26', false),
            (1629029,2025, 95, 'mavericks',        'nba-2k26', false),
            (1628983,2025, 98, 'thunder',          'nba-2k26', false),
            (2544,   2024, 95, 'lakers',           'nba-2k25', false),
            (203999, 2024, 96, 'nuggets',          'nba-2k25', false),
            (201939, 2024, 95, 'warriors',         'nba-2k25', false),
            (1629029,2024, 93, 'mavericks',        'nba-2k25', false),
            (1628983,2024, 92, 'thunder',          'nba-2k25', false)
          ON CONFLICT DO NOTHING;

          INSERT INTO stats (player_id, season_year, team_abbr, age, gp, min, pts, reb, ast, stl, blk, tov, fg_pct, fg3_pct, ft_pct, net_rating, usg_pct, ast_pct, ast_to, pie)
          VALUES
            (2544,   2025, 'LAL', 40.0, 70, 35.0, 24.4, 7.8, 8.2, 1.1, 0.5, 3.2, 0.540, 0.410, 0.750, 5.0, 0.310, 0.350, 2.50, 0.180),
            (203999, 2025, 'DEN', 30.0, 70, 36.0, 29.6,12.7,10.2, 1.8, 0.6, 3.3, 0.580, 0.420, 0.800,10.5, 0.285, 0.398, 3.11, 0.206),
            (201939, 2025, 'GSW', 36.0, 65, 33.0, 24.5, 4.4, 6.0, 0.8, 0.3, 2.5, 0.450, 0.420, 0.920, 8.0, 0.290, 0.280, 2.80, 0.170),
            (1629029,2025, 'DAL', 26.0, 50, 35.0, 28.2, 8.2, 7.7, 1.8, 0.4, 3.6, 0.450, 0.368, 0.782, 9.1, 0.328, 0.342, 2.14, 0.170),
            (1628983,2025, 'OKC', 26.0, 76, 34.0, 32.7, 5.0, 6.4, 1.7, 1.0, 2.4, 0.519, 0.375, 0.898,16.7, 0.336, 0.299, 2.66, 0.199),
            (2544,   2026, 'LAL', 41.0, 45, 33.0, 21.4, 5.7, 7.0, 0.9, 0.4, 2.8, 0.510, 0.380, 0.720, 3.0, 0.285, 0.320, 2.20, 0.160),
            (203999, 2026, 'DEN', 31.0, 60, 35.0, 28.7,12.7,10.4, 1.7, 0.5, 3.1, 0.570, 0.410, 0.790, 9.0, 0.278, 0.390, 3.00, 0.200),
            (201939, 2026, 'GSW', 37.0, 55, 32.0, 27.2, 3.5, 4.8, 0.7, 0.2, 2.2, 0.440, 0.430, 0.910, 6.0, 0.280, 0.260, 2.60, 0.160),
            (1629029,2026, 'LAL', 27.0, 54, 35.0, 32.9, 7.9, 8.5, 1.8, 0.4, 3.5, 0.460, 0.375, 0.790,10.0, 0.335, 0.350, 2.20, 0.175),
            (1628983,2026, 'OKC', 27.0, 70, 34.0, 31.8, 4.5, 6.6, 1.6, 0.9, 2.3, 0.525, 0.380, 0.905,18.0, 0.330, 0.305, 2.70, 0.195)
          ON CONFLICT DO NOTHING;

          INSERT INTO features (player_id, season_year, career_year, pts_delta, reb_delta, ast_delta, ovr_prev, ovr_delta)
          VALUES
            (2544,   2025, 7, -1.3, 0.5, -0.1, 95.0, -1.0),
            (203999, 2025, 7,  2.1, 1.2,  0.8, 96.0,  2.0),
            (201939, 2025, 6, -1.0,-0.5, -0.3, 95.0, -1.0),
            (1629029,2025, 6,  3.2, 0.8,  1.1, 93.0,  2.0),
            (1628983,2025, 7,  4.5, 0.3,  0.9, 92.0,  6.0),
            (2544,   2026, 8, -3.0,-2.1, -1.2, 94.0,  NULL),
            (203999, 2026, 8, -0.9, 0.0,  0.2, 98.0,  NULL),
            (201939, 2026, 7,  2.7,-0.9, -1.2, 94.0,  NULL),
            (1629029,2026, 7,  4.7,-0.3,  0.8, 95.0,  NULL),
            (1628983,2026, 8, -0.9,-0.5,  0.2, 98.0,  NULL)
          ON CONFLICT DO NOTHING;
          "

      - name: Test DB connection
        run: |
          python -c "
          from sqlalchemy import create_engine, text
          engine = create_engine('postgresql://nba2k_user:nba2k_pass@localhost:5432/nba2k_db')
          with engine.connect() as c:
              c.execute(text('SELECT 1'))
              print('DB connected!')
          "

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          command_timeout: 30m
          script: |
            cd ~/nba2k-ml
            git pull origin main
            docker compose up -d --build
            docker system prune -f